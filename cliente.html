<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cliente</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn{
  background:#22c55e;
}
.logout{
  background:#ef4444;
}
.alerta{
  color:#f87171;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>💰 Cliente</h2>
<p id="user"></p>

<!-- CUPO -->
<div class="card">
<h3>💳 Cupo disponible: $100000</h3>
</div>

<!-- SOLICITAR -->
<div class="card">
<h3>Solicitar préstamo</h3>

<input id="monto" type="number" placeholder="Monto" max="100000">
<input id="cuotas" type="number" placeholder="Cuotas" max="1">
<input id="dias" type="number" placeholder="Días">

<button class="btn" onclick="solicitar()">Solicitar</button>
</div>

<!-- LISTA -->
<div class="card">
<h3>Mis préstamos</h3>
<div id="lista"></div>
</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

let lista = document.getElementById("lista");

// 🔐 VALIDAR USUARIO
auth.onAuthStateChanged(async (user)=>{

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("user").innerText = user.email;

  cargarPrestamos(user.uid);
});

// 📊 CARGAR PRÉSTAMOS
async function cargarPrestamos(uid){

  lista.innerHTML = "Cargando...";

  let datos = await db.collection("prestamos")
    .where("userId","==",uid)
    .get();

  lista.innerHTML = "";

  if(datos.empty){
    lista.innerHTML = "<p>No tienes préstamos</p>";
    return;
  }

  datos.forEach(doc=>{
    let d = doc.data();

    let hoy = new Date();
    let vencido = hoy > new Date(d.fechaVencimiento);

    lista.innerHTML += `
      <div class="card">
        💵 $${d.monto}<br>
        📊 Estado: ${d.estado}<br>
        📆 Días: ${d.dias}<br>
        📅 Solicitud: ${new Date(d.fecha).toLocaleDateString()}<br>
        ⏳ Vence: ${new Date(d.fechaVencimiento).toLocaleDateString()}<br>
        🧾 Cuotas: ${d.pagadas || 0}/${d.cuotas}<br>
        ${vencido && d.estado==="pendiente" ? '<span class="alerta">⚠️ VENCIDO</span>' : ''}
      </div>
    `;
  });
}

// 🟢 SOLICITAR
async function solicitar(){

  let user = auth.currentUser;

  let monto = parseFloat(document.getElementById("monto").value);
  let cuotas = parseInt(document.getElementById("cuotas").value);
  let dias = parseInt(document.getElementById("dias").value);

  if(!monto || !cuotas || !dias){
    alert("Completa todos los datos");
    return;
  }

  // 🔒 VALIDACIONES
  if(monto > 100000){
    alert("❌ Máximo permitido: $100000");
    return;
  }

  if(cuotas > 1){
    alert("❌ Solo se permite 1 cuota");
    return;
  }

  let hoy = new Date();
  let vencimiento = new Date();
  vencimiento.setDate(hoy.getDate() + dias);

  try{

    await db.collection("prestamos").add({
      userId: user.uid,
      monto,
      cuotas,
      dias,
      pagadas: 0,
      estado: "pendiente",
      fecha: hoy.toISOString(),
      fechaVencimiento: vencimiento.toISOString()
    });

    alert("Solicitud enviada ✔️");

    cargarPrestamos(user.uid);

  }catch(e){
    alert("Error: " + e.message);
  }
}

// 🚫 BLOQUEO EN TIEMPO REAL
document.getElementById("monto").addEventListener("input", function(){
  if(this.value > 100000){
    this.value = 100000;
  }
});

document.getElementById("cuotas").addEventListener("input", function(){
  if(this.value > 1){
    this.value = 1;
  }
});

// 🚪 LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "login.html";
  });
}

</script>

</body>
</html>
