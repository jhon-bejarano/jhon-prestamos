<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Cliente - J.B Capital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:25px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

h2{
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🟢 Registro Cliente</h2>

<input id="nombre" placeholder="Nombre completo">
<input id="telefono" placeholder="Teléfono">
<input id="email" placeholder="Correo electrónico">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="registrar()">Crear cuenta</button>

</div>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// 🟢 FUNCIÓN REGISTRO
async function registrar(){

  console.log("CLICK DETECTADO"); // DEBUG

  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!nombre || !telefono || !email || !password){
    alert("Completa todos los campos");
    return;
  }

  try {

    console.log("CREANDO USUARIO...");

    // 1. CREAR USUARIO EN AUTH
    let userCredential = await auth.createUserWithEmailAndPassword(email, password);

    let uid = userCredential.user.uid;

    console.log("USUARIO CREADO:", uid);

    // 2. GUARDAR EN FIRESTORE
    await db.collection("clientes").doc(uid).set({
      uid: uid,
      nombre: nombre,
      telefono: telefono,
      email: email,
      fechaRegistro: new Date().toISOString()
    });

    console.log("CLIENTE GUARDADO");

    alert("Cuenta creada correctamente ✔️");

    // 3. REDIRECCIÓN
    window.location.href = "cliente.html";

  } catch (error) {

    console.error("ERROR:", error);
    alert("Error: " + error.message);

  }
}

</script>

</body>
</html>
