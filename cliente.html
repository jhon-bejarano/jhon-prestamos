<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.B Capital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-weight:600;
}

/* CARD SALDO */
.card{
    background: rgba(255,255,255,0.1);
    margin:20px;
    padding:20px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

.balance{
    font-size:28px;
    font-weight:bold;
}

/* BOTONES */
.actions{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.btn{
    background:white;
    color:#2575fc;
    padding:12px 20px;
    border-radius:10px;
    border:none;
    font-weight:600;
    cursor:pointer;
}

/* SERVICIOS */
.services{
    margin:20px;
}

.service{
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
}

/* TRANSACCIONES */
.transactions{
    margin:20px;
}

.tx{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
</style>

</head>
<body>

<div class="header">
    <h2>J.B Capital</h2>
    <span>👤</span>
</div>

<div class="card">
    <p>Saldo disponible</p>
    <div class="balance" id="saldo">$1,500,000</div>

    <div class="actions">
        <button class="btn" onclick="depositar()">Depositar</button>
        <button class="btn" onclick="retirar()">Retirar</button>
    </div>
</div>

<div class="services">
    <h3>Servicios</h3>

    <div class="service">💳 Tarjetas</div>
    <div class="service">📈 Inversiones</div>
    <div class="service">💰 Préstamos</div>
</div>

<div class="transactions">
    <h3>Movimientos</h3>

    <div class="tx">
        <span>Depósito</span>
        <span>+$200,000</span>
    </div>

    <div class="tx">
        <span>Pago</span>
        <span>-$50,000</span>
    </div>

</div>

<script>
let saldo = 1500000;

function actualizarUI(){
    document.getElementById("saldo").innerText = "$" + saldo.toLocaleString();
}

function depositar(){
    let valor = prompt("Ingrese valor a depositar:");
    if(valor){
        saldo += parseInt(valor);
        actualizarUI();
    }
}

function retirar(){
    let valor = prompt("Ingrese valor a retirar:");
    if(valor && saldo >= valor){
        saldo -= parseInt(valor);
        actualizarUI();
    } else {
        alert("Saldo insuficiente");
    }
}
</script>

</body>
</html>
