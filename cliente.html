<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin:10px;}
</style>
</head>

<body>

<h2>💰 Cliente</h2>
<p id="user"></p>
<div id="lista"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  document.getElementById("user").innerText=user.email;

  db.collection("prestamos")
  .where("clienteId","==",user.uid)
  .get()
  .then(d=>{
    let lista=document.getElementById("lista");
    lista.innerHTML="";

    if(d.empty){
      lista.innerHTML="No tienes préstamos";
      return;
    }

    d.forEach(doc=>{
      let x=doc.data();

      lista.innerHTML+=`
      <div class="card">
        💵 $${x.monto}<br>
        💰 Total: $${x.total}
      </div>`;
    });
  });
});
</script>

</body>
</html>
