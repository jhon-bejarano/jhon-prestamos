<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cliente</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn{ background:#22c55e; }
.logout{ background:#ef4444; }
.alerta{ color:#f87171; font-weight:bold; }
</style>

</head>

<body>

<div class="container">

<h2>💰 Cliente</h2>
<p id="user"></p>

<div class="card">
<h3>💳 Cupo disponible: COP $100.000</h3>
</div>

<div class="card">
<h3>Solicitar préstamo</h3>

<input id="monto" type="number" placeholder="Monto" max="100000">
<input id="cuotas" type="number" placeholder="Cuotas" max="1">

<select id="dias">
  <option value="">Selecciona días</option>
  <option value="15">15 días</option>
  <option value="20">20 días</option>
</select>

<button class="btn" onclick="solicitar()">Solicitar</button>
</div>

<div class="card">
<h3>📊 Resumen</h3>
<p>💰 Interés + recargo: <span id="interes">COP $0</span></p>
<p>💵 Total a pagar: <span id="total">COP $0</span></p>
</div>

<div class="card">
<h3>Mis préstamos</h3>
<div id="lista"></div>
</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let lista = document.getElementById("lista");

// 💰 FORMATO COP
function formatoCOP(valor){
  return "COP $" + valor.toLocaleString("es-CO");
}

// 🔐 LOGIN
auth.onAuthStateChanged(async (user)=>{

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("user").innerText = user.email;

  cargarPrestamos(user.uid);
});

// 📊 CARGAR
async function cargarPrestamos(uid){

  lista.innerHTML = "";

  let datos = await db.collection("prestamos")
    .where("userId","==",uid)
    .get();

  if(datos.empty){
    lista.innerHTML = "<p>No tienes préstamos</p>";
    return;
  }

  datos.forEach(doc=>{
    let d = doc.data();

    lista.innerHTML += `
      <div class="card">
        💵 ${formatoCOP(d.monto)}<br>
        💰 Interés: ${formatoCOP(d.interes)}<br>
        ➕ Recargo: ${formatoCOP(d.recargo || 0)}<br>
        📊 Total: ${formatoCOP(d.total)}<br>
        📊 Estado: ${d.estado}<br>
        📆 Días: ${d.dias}<br>
        📅 Solicitud: ${new Date(d.fecha).toLocaleDateString()}<br>
        ⏳ Vence: ${new Date(d.fechaVencimiento).toLocaleDateString()}<br>
      </div>
    `;
  });
}

// 🧠 CALCULAR
function calcular(){

  let monto = parseFloat(document.getElementById("monto").value) || 0;
  let dias = parseInt(document.getElementById("dias").value);

  let interes = monto * 0.20;
  let recargo = dias === 20 ? 8000 : 0;

  let total = monto + interes + recargo;

  document.getElementById("interes").innerText = formatoCOP(interes + recargo);
  document.getElementById("total").innerText = formatoCOP(total);
}

// 🟢 SOLICITAR
async function solicitar(){

  let user = auth.currentUser;

  let monto = parseFloat(document.getElementById("monto").value);
  let cuotas = parseInt(document.getElementById("cuotas").value);
  let dias = parseInt(document.getElementById("dias").value);

  if(!monto || !cuotas || !dias){
    alert("Completa todos los datos");
    return;
  }

  if(monto > 100000){
    alert("Máximo: COP $100.000");
    return;
  }

  if(cuotas > 1){
    alert("Solo 1 cuota");
    return;
  }

  let interes = monto * 0.20;
  let recargo = dias === 20 ? 8000 : 0;
  let total = monto + interes + recargo;

  let hoy = new Date();
  let vencimiento = new Date();
  vencimiento.setDate(hoy.getDate() + dias);

  await db.collection("prestamos").add({
    userId: user.uid,
    monto,
    cuotas,
    dias,
    interes,
    recargo,
    total,
    estado: "pendiente",
    fecha: hoy.toISOString(),
    fechaVencimiento: vencimiento.toISOString()
  });

  alert("Solicitud enviada ✔️");

  cargarPrestamos(user.uid);
}

// 🚫 BLOQUEOS
document.getElementById("monto").addEventListener("input", function(){
  if(this.value > 100000) this.value = 100000;
  calcular();
});

document.getElementById("cuotas").addEventListener("input", function(){
  if(this.value > 1) this.value = 1;
});

document.getElementById("dias").addEventListener("change", calcular);

// 🚪 LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "login.html";
  });
}

</script>

</body>
</html>
