<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cliente - J.B Capital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#3b82f6;}
.red{background:#ef4444;}

.alerta{
  color:#f87171;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 J.B Capital - Cliente</h2>

<p>👤 <b id="user">Cargando...</b></p>

<div id="lista"></div>

<button class="red" onclick="logout()">Cerrar sesión</button>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let lista = document.getElementById("lista");

// 🔐 PROTECCIÓN DE RUTA
auth.onAuthStateChanged((user)=>{

  if(!user){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("user").innerText = user.email;

  cargarPrestamos(user.uid);
});

// 📊 CARGAR PRÉSTAMOS DEL CLIENTE
async function cargarPrestamos(uid){

  lista.innerHTML = "Cargando...";

  let datos = await db.collection("prestamos")
    .where("clienteId","==",uid)
    .get();

  lista.innerHTML = "";

  if(datos.empty){
    lista.innerHTML = "<p>No tienes préstamos</p>";
    return;
  }

  datos.forEach(doc=>{
    let d = doc.data();

    let vencido = new Date() > new Date(d.fechaPago);

    lista.innerHTML += `
    <div class="card">

      <b>💵 Monto:</b> $${d.monto}<br>
      <b>💰 Total:</b> $${d.total}<br>
      <b>🧾 Cuotas:</b> ${d.pagadas}/${d.cuotas}<br>
      <b>📅 Vence:</b> ${new Date(d.fechaPago).toLocaleDateString()}<br>

      ${vencido ? '<span class="alerta">⚠️ VENCIDO</span>' : ''}

      <a href="https://wa.me/57${d.telefono}" target="_blank">
        <button class="blue">Contactar</button>
      </a>

    </div>
    `;
  });
}

// 🚪 LOGOUT
function logout(){
  auth.signOut().then(()=>{
    window.location.href = "login.html";
  });
}

</script>

</body>
</html>
