<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cliente</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}
button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.btn{ background:#22c55e; }
.filtro{ background:#3b82f6; }
.logout{ background:#ef4444; }
.alerta{ color:#f87171; font-weight:bold; }
</style>

</head>

<body>

<div class="container">

<h2>💰 Cliente</h2>
<p id="user"></p>

<div class="card">
<h3>💳 Cupo disponible: COP $100.000</h3>
</div>

<div class="card">
<h3>Solicitar préstamo</h3>

<input id="monto" type="number" placeholder="Monto" max="100000">
<input id="cuotas" type="number" placeholder="Cuotas" max="1">

<select id="dias">
  <option value="">Selecciona días</option>
  <option value="15">15 días</option>
  <option value="20">20 días</option>
</select>

<button class="btn" onclick="solicitar()">Solicitar</button>
</div>

<div class="card">
<h3>📊 Resumen</h3>
<p>💰 Interés + recargo: <span id="interes">COP $0</span></p>
<p>💵 Total: <span id="total">COP $0</span></p>
</div>

<!-- FILTROS -->
<div class="card">
<button class="filtro" onclick="verActivos()">💰 Activos</button>
<button class="filtro" onclick="verPagados()">✅ Pagados</button>
<button class="filtro" onclick="verVencidos()">⚠️ Vencidos</button>
<button class="filtro" onclick="verHistorial()">📜 Historial</button>
</div>

<div class="card">
<h3>Mis préstamos</h3>
<div id="lista"></div>
</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let lista = document.getElementById("lista");

function formatoCOP(valor){
  return "COP $" + valor.toLocaleString("es-CO");
}

auth.onAuthStateChanged(async (user)=>{
  if(!user) return location.href="login.html";
  document.getElementById("user").innerText=user.email;
  cargarPrestamos(user.uid);
});

// 🔥 MOSTRAR TODOS
async function cargarPrestamos(uid){
  let datos = await db.collection("prestamos").where("userId","==",uid).get();
  pintar(datos);
}

// 🎨 PINTAR
function pintar(datos){
  lista.innerHTML="";

  datos.forEach(doc=>{
    let d=doc.data();
    let vencido=new Date()>new Date(d.fechaVencimiento);

    lista.innerHTML+=`
    <div class="card">
      💵 ${formatoCOP(d.monto)}<br>
      💰 ${formatoCOP(d.interes)}<br>
      ➕ ${formatoCOP(d.recargo||0)}<br>
      📊 ${formatoCOP(d.total)}<br>
      📊 Estado: ${d.estado}<br>
      📆 ${d.dias} días<br>
      ${vencido && d.estado==="pendiente" ? '<span class="alerta">⚠️ VENCIDO</span>' : ''}
    </div>`;
  });
}

// 🔘 FILTROS
async function verActivos(){
  let user=auth.currentUser;
  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid)
    .where("estado","==","pendiente")
    .get();
  pintar(datos);
}

async function verPagados(){
  let user=auth.currentUser;
  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid)
    .where("estado","==","pagado")
    .get();
  pintar(datos);
}

async function verVencidos(){
  let user=auth.currentUser;
  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid)
    .get();

  let filtrados=[];
  datos.forEach(doc=>{
    let d=doc.data();
    if(new Date()>new Date(d.fechaVencimiento) && d.estado==="pendiente"){
      filtrados.push(doc);
    }
  });

  lista.innerHTML="";
  filtrados.forEach(doc=>{
    let d=doc.data();
    lista.innerHTML+=`
    <div class="card alerta">
      ⚠️ VENCIDO<br>
      ${formatoCOP(d.total)}
    </div>`;
  });
}

async function verHistorial(){
  let user=auth.currentUser;
  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid)
    .get();
  pintar(datos);
}

// 🧠 CALCULAR
function calcular(){
  let monto=parseFloat(monto.value)||0;
  let dias=parseInt(dias.value);

  let interes=monto*0.20;
  let recargo=dias===20?8000:0;
  let total=monto+interes+recargo;

  document.getElementById("interes").innerText=formatoCOP(interes+recargo);
  document.getElementById("total").innerText=formatoCOP(total);
}

// 🟢 SOLICITAR
async function solicitar(){
  let user=auth.currentUser;

  let montoVal=parseFloat(monto.value);
  let cuotasVal=parseInt(cuotas.value);
  let diasVal=parseInt(dias.value);

  if(!montoVal||!cuotasVal||!diasVal) return alert("Completa todo");

  if(montoVal>100000) return alert("Máximo $100.000");

  let interes=montoVal*0.20;
  let recargo=diasVal===20?8000:0;
  let total=montoVal+interes+recargo;

  let hoy=new Date();
  let vencimiento=new Date();
  vencimiento.setDate(hoy.getDate()+diasVal);

  await db.collection("prestamos").add({
    userId:user.uid,
    monto:montoVal,
    cuotas:cuotasVal,
    dias:diasVal,
    interes,
    recargo,
    total,
    estado:"pendiente",
    fecha:hoy.toISOString(),
    fechaVencimiento:vencimiento.toISOString()
  });

  alert("Solicitud enviada");
  cargarPrestamos(user.uid);
}

// 🚫 BLOQUEOS
monto.addEventListener("input",()=>{ if(monto.value>100000)monto.value=100000; calcular();});
cuotas.addEventListener("input",()=>{ if(cuotas.value>1)cuotas.value=1;});
dias.addEventListener("change",calcular);

// 🚪 LOGOUT
function logout(){
  auth.signOut().then(()=>location.href="login.html");
}

</script>

</body>
</html>
