<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.B Capital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#7b2ff7,#f107a3);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* EFECTOS DE FONDO */
body::before, body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    z-index:0;
}

body::before{
    width:300px;
    height:300px;
    background:#00c6ff;
    top:10%;
    left:-100px;
}

body::after{
    width:300px;
    height:300px;
    background:#ff00cc;
    bottom:10%;
    right:-100px;
}

/* CONTENIDO */
.container{
    position:relative;
    z-index:1;
}

/* HEADER */
.header{
    padding:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-weight:600;
    font-size:20px;
}

.profile{
    background: rgba(255,255,255,0.2);
    padding:10px;
    border-radius:50%;
    backdrop-filter: blur(10px);
}

/* CARD PRINCIPAL */
.card{
    margin:20px;
    padding:25px;
    border-radius:25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.card p{
    opacity:0.8;
}

.balance{
    font-size:34px;
    font-weight:600;
    margin:10px 0;
}

/* BOTONES */
.actions{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    gap:10px;
}

.btn{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.deposit{
    background: linear-gradient(135deg,#00f2fe,#4facfe);
    color:white;
}

.withdraw{
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
}

.btn:hover{
    transform:scale(1.05);
}

/* SERVICIOS */
.services{
    margin:20px;
}

.services h3{
    margin-bottom:10px;
}

.service{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    transition:0.3s;
}

.service:hover{
    transform:translateY(-3px);
}

/* TRANSACCIONES */
.transactions{
    margin:20px;
}

.transactions h3{
    margin-bottom:10px;
}

.tx{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-radius:12px;
    margin-bottom:8px;
    background: rgba(255,255,255,0.08);
}

.positive{
    color:#00ff9d;
}

.negative{
    color:#ff4b5c;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
    <h2>J.B Capital</h2>
    <div class="profile">👤</div>
</div>

<div class="card">
    <p>Saldo disponible</p>
    <div class="balance" id="saldo">$1,500,000</div>

    <div class="actions">
        <button class="btn deposit" onclick="depositar()">Depositar</button>
        <button class="btn withdraw" onclick="retirar()">Retirar</button>
    </div>
</div>

<div class="services">
    <h3>Servicios</h3>

    <div class="service">
        <span>💳 Tarjetas</span>
        <span>→</span>
    </div>

    <div class="service">
        <span>📈 Inversiones</span>
        <span>→</span>
    </div>

    <div class="service">
        <span>💰 Préstamos</span>
        <span>→</span>
    </div>
</div>

<div class="transactions">
    <h3>Movimientos</h3>

    <div class="tx">
        <span>Depósito</span>
        <span class="positive">+$200,000</span>
    </div>

    <div class="tx">
        <span>Pago</span>
        <span class="negative">-$50,000</span>
    </div>

</div>

</div>

<script>
let saldo = 1500000;

function actualizarUI(){
    document.getElementById("saldo").innerText = "$" + saldo.toLocaleString();
}

function depositar(){
    let valor = prompt("Ingrese valor a depositar:");
    if(valor){
        saldo += parseInt(valor);
        actualizarUI();
    }
}

function retirar(){
    let valor = prompt("Ingrese valor a retirar:");
    if(valor && saldo >= valor){
        saldo -= parseInt(valor);
        actualizarUI();
    } else {
        alert("Saldo insuficiente");
    }
}
</script>

</body>
</html>
