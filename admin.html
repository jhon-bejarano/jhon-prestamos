<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - J.B Capital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

/* 🔥 FONDO */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: url("fondo.jpg") no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🔥 CAPA OSCURA */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

/* 🔥 TARJETA CENTRAL (TIPO APP) */
.card{
  width:320px;
  background: rgba(15,23,42,0.95);
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  text-align:center;
}

/* 🔥 LOGO / TÍTULO */
.title{
  font-size:20px;
  margin-bottom:20px;
  font-weight:bold;
}

/* 🔥 INPUTS */
input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#020617;
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#94a3b8;
}

/* 🔥 BOTONES */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* NEQUI STYLE */
.btn-primary{
  background:#00c853;
}
.btn-primary:hover{
  background:#00b248;
}

.btn-secondary{
  background:#2979ff;
}
.btn-secondary:hover{
  background:#1565c0;
}

/* 🔥 OTP */
#codigo{
  text-align:center;
  letter-spacing:6px;
  font-size:18px;
}

</style>
</head>

<body>

<div class="app">

<h2>💼 Admin - J.B Capital</h2>

<div class="card">
💰 Ganancia: <span id="ganancia">0</span><br>
💵 Prestado: <span id="prestado">0</span><br>
📊 Pendientes: <span id="pendientes">0</span>
</div>

<button class="blue" onclick="cargar()">Ver todos</button>
<button class="orange" onclick="verVencidos()">Vencidos</button>

<div id="lista"></div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 SEGURIDAD ADMIN
auth.onAuthStateChanged(user=>{
  if(!user || user.email !== "bjhon1994@gmail.com"){
    alert("Acceso denegado");
    window.location.href="login.html";
  }else{
    cargar();
  }
});

// 💰 FORMATO
function cop(n){
  return "COP $" + n.toLocaleString("es-CO");
}

// 🔄 CARGAR TODO + CLIENTES
async function cargar(){

  let datos = await db.collection("prestamos").get();

  let g=0, p=0, pen=0;
  lista.innerHTML="";

  for(const doc of datos.docs){

    let d = doc.data();

    g += d.interes + (d.recargo||0);
    p += d.monto;
    if(d.estado==="pendiente") pen++;

    // 👤 TRAER CLIENTE
    let clienteDoc = await db.collection("clientes").doc(d.userId).get();
    let cliente = clienteDoc.exists ? clienteDoc.data() : {};

    let nombre = cliente.nombre || "Sin nombre";
    let telefono = cliente.telefono || "";
    let email = cliente.email || "";

    let vencido = new Date() > new Date(d.fechaVencimiento);

    lista.innerHTML += `
    <div class="card">

      👤 ${nombre}<br>
      📧 ${email}<br>
      📱 ${telefono}<br><br>

      💵 ${cop(d.monto)}<br>
      💰 Total: ${cop(d.total)}<br>
      📊 Estado: ${d.estado.toUpperCase()}<br>
      📆 ${d.dias} días<br>

      ${vencido && d.estado==="aprobado" ? '<span class="alerta">⚠️ VENCIDO</span><br>' : ''}

      ${telefono ? `
      <a href="https://wa.me/57${telefono}?text=Hola ${nombre}, tienes un préstamo pendiente de ${cop(d.total)}" target="_blank">
        <button class="blue">Cobrar por WhatsApp</button>
      </a>` : ""}

      ${d.estado==="pendiente" ? 
        `<button class="blue" onclick="aprobar('${doc.id}')">Aprobar</button>` : ""}

      ${d.estado==="aprobado" ? 
        `<button class="green" onclick="pagado('${doc.id}')">Pagado</button>` : ""}

      <button class="red" onclick="eliminar('${doc.id}')">Eliminar</button>

    </div>`;
  }

  ganancia.innerText = cop(g);
  prestado.innerText = cop(p);
  pendientes.innerText = pen;
}

// ✅ APROBAR
async function aprobar(id){
  await db.collection("prestamos").doc(id).update({
    estado:"aprobado"
  });
  cargar();
}

// 💰 PAGADO
async function pagado(id){

  let ref = db.collection("prestamos").doc(id);
  let doc = await ref.get();

  if(doc.data().estado !== "aprobado"){
    alert("Primero debes aprobar");
    return;
  }

  await ref.update({
    estado:"pagado"
  });

  cargar();
}

// ❌ ELIMINAR
async function eliminar(id){
  await db.collection("prestamos").doc(id).delete();
  cargar();
}

// ⚠️ VENCIDOS
async function verVencidos(){

  let datos = await db.collection("prestamos").get();
  lista.innerHTML="";

  for(const doc of datos.docs){

    let d = doc.data();

    if(new Date()>new Date(d.fechaVencimiento) && d.estado==="aprobado"){
      lista.innerHTML+=`
      <div class="card alerta">
        ⚠️ ${cop(d.total)} vencido
      </div>`;
    }
  }
}

</script>

</body>
</html>
