<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px;}
.card{background:#1e293b;padding:15px;margin-top:10px;border-radius:10px;}
button{margin-top:5px;}
</style>

</head>

<body>

<h2>🧑‍💼 Admin</h2>

<div id="lista"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(async user=>{
  if(!user || user.email !== "bjhon1994@gmail.com"){
    location.href="login.html";
    return;
  }

  let lista = document.getElementById("lista");
  lista.innerHTML="";

  let datos = await db.collection("prestamos").get();

  datos.forEach(doc=>{
    let d = doc.data();

    lista.innerHTML += `
      <div class="card">
        $${d.monto} | ${d.estado}
        <button onclick="aprobar('${doc.id}')">Aprobar</button>
      </div>
    `;
  });
});

async function aprobar(id){
  await db.collection("prestamos").doc(id).update({
    estado:"aprobado"
  });
  location.reload();
}

</script>

</body>
</html>
