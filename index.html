<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>J.B Capital - Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

.app {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.header {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin-bottom:15px;
}

.panel, .card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input, select {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main { background:#22c55e; }
.btn-blue { background:#3b82f6; }
.btn-orange { background:#f59e0b; }
.btn-red { background:#ef4444; }

.alerta {
  color:#f87171;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Admin Login</h2>
  <input id="email" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">
  <button class="btn-main" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="header">
  <h1>💰 J.B Capital Admin</h1>
</div>

<div class="panel">
  <h3>📋 Crear préstamo</h3>

  <!-- CLIENTE SELECCIONADO -->
  <select id="clienteId">
    <option value="">Seleccionar cliente</option>
  </select>

  <input id="nombre" placeholder="Nombre">
  <input id="telefono" placeholder="Teléfono">
  <input id="monto" placeholder="Monto">
  <input id="interes" placeholder="Interés %">
  <input id="dias" placeholder="Días">
  <input id="cuotas" placeholder="Cuotas">

  <button class="btn-main" onclick="guardar()">Guardar préstamo</button>
</div>

<div class="panel">
  <button class="btn-blue" onclick="cargar()">Ver préstamos</button>
</div>

<h3>📋 Lista</h3>
<div id="lista"></div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let lista = document.getElementById("lista");

// LOGIN
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    cargarClientes();
    cargar();
  })
  .catch(e=>alert(e.message));
}

function val(id){
  return document.getElementById(id).value;
}

// 🔵 CARGAR CLIENTES EN DROPDOWN
async function cargarClientes(){

  let select = document.getElementById("clienteId");
  select.innerHTML = `<option value="">Seleccionar cliente</option>`;

  let clientes = await db.collection("clientes").get();

  clientes.forEach(doc=>{
    let c = doc.data();

    select.innerHTML += `
      <option value="${c.uid}">
        ${c.nombre} - ${c.telefono}
      </option>
    `;
  });
}

// 💰 GUARDAR PRÉSTAMO
async function guardar(){

  let clienteId = val("clienteId");
  let nombre = val("nombre");
  let telefono = val("telefono");
  let monto = parseFloat(val("monto"));
  let interes = parseFloat(val("interes"));
  let dias = parseInt(val("dias"));
  let cuotas = parseInt(val("cuotas"));

  if(!clienteId || !nombre || !telefono || !monto || !interes || !dias || !cuotas){
    alert("Completa todo");
    return;
  }

  let total = monto + (monto * interes / 100);
  let cuotaValor = total / cuotas;

  let f = new Date();
  let pago = new Date();
  pago.setDate(f.getDate() + dias);

  await db.collection("prestamos").add({
    clienteId,
    nombre,
    telefono,
    monto,
    interes,
    total,
    cuotas,
    cuotaValor,
    pagadas:0,
    fecha: f.toISOString(),
    fechaPago: pago.toISOString(),
    estado:"pendiente"
  });

  alert("Préstamo creado ✔️");

  document.querySelectorAll("input").forEach(i=>i.value="");
  cargar();
}

// 📋 CARGAR PRÉSTAMOS
async function cargar(){

  let datos = await db.collection("prestamos").get();

  lista.innerHTML = "";

  datos.forEach(doc=>{
    let d = doc.data();

    let vencido = new Date() > new Date(d.fechaPago);

    lista.innerHTML += `
    <div class="card">

      <b>${d.nombre}</b><br>
      📞 ${d.telefono}<br>
      💵 $${d.monto} → $${d.total}<br>
      📅 Vence: ${new Date(d.fechaPago).toLocaleDateString()}<br>
      🧾 ${d.pagadas}/${d.cuotas}<br>

      ${vencido ? '<span class="alerta">⚠️ VENCIDO</span><br>' : ''}

      <a href="https://wa.me/57${d.telefono}?text=Hola ${d.nombre}, debes $${d.total}" target="_blank">
        <button class="btn-blue">Cobrar</button>
      </a>

    </div>
    `;
  });
}

</script>

</body>
</html>
