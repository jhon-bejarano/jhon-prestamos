<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>J.B Préstamos PRO MAX</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
}
.app { max-width:420px; width:100%; padding:20px; text-align:center; }
input,button { width:90%; padding:10px; margin:5px; border-radius:6px; border:none; }
button { background:green; color:white; font-weight:bold; cursor:pointer; }
.delete { background:red; }
.card { background:#111827; margin-top:10px; padding:10px; border-radius:8px; }
.alerta { color:red; font-weight:bold; }
</style>
</head>

<body>

<div class="app">

<div id="login">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

<h1>💰 J.B Préstamos</h1>

<h3>💵 Ganancia total: $<span id="gananciaTotal">0</span></h3>
<h3>📊 Total prestado: $<span id="totalPrestado">0</span></h3>
<h3>⚠️ Pendientes: <span id="pendientes">0</span></h3>
<h3>📅 Hoy ganaste: $<span id="hoy">0</span></h3>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono (ej: 3001234567)">
<input id="monto" placeholder="Monto">
<input id="interes" placeholder="Interés %">
<input id="dias" placeholder="Días para pagar">
<input id="cuotas" placeholder="Número de cuotas">

<button onclick="guardar()">Guardar</button>
<button onclick="verVencidos()">Ver vencidos</button>
<button onclick="cargar()">Ver todos</button>
<button onclick="recordar()">Enviar recordatorios</button>

<h2>📋 Lista</h2>
<div id="lista"></div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login(){
  firebase.auth().signInWithEmailAndPassword(
    document.getElementById("user").value,
    document.getElementById("pass").value
  ).then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    cargar();
  }).catch(e=>alert(e.message));
}

// GUARDAR
async function guardar(){
  let user = firebase.auth().currentUser;

  let nombre = document.getElementById("nombre").value;
  let telefono = document.getElementById("telefono").value;
  let monto = parseFloat(document.getElementById("monto").value);
  let interes = parseFloat(document.getElementById("interes").value);
  let dias = parseInt(document.getElementById("dias").value);
  let cuotas = parseInt(document.getElementById("cuotas").value);

  if (!nombre || !telefono || !monto || !interes || !dias || !cuotas){
    alert("Completa todo");
    return;
  }

  let total = monto + (monto * interes / 100);
  let cuotaValor = total / cuotas;

  let fecha = new Date();
  let fechaPago = new Date();
  fechaPago.setDate(fecha.getDate() + dias);

  await db.collection("prestamos").add({
    nombre,
    telefono,
    monto,
    interes,
    total,
    cuotas,
    cuotaValor,
    pagadas:0,
    fecha: fecha.toISOString(),
    fechaPago: fechaPago.toISOString(),
    estado:"pendiente",
    userId:user.uid
  });

  alert("Guardado ✔️");

  document.getElementById("nombre").value="";
  document.getElementById("telefono").value="";
  document.getElementById("monto").value="";
  document.getElementById("interes").value="";
  document.getElementById("dias").value="";
  document.getElementById("cuotas").value="";

  cargar();
}

// CARGAR
async function cargar(){
  let user = firebase.auth().currentUser;

  let datos = await db.collection("prestamos")
    .where("userId","==",user.uid).get();

  let totalGanancia=0,totalPrestado=0,pendientes=0,gananciaHoy=0;
  let hoy=new Date().toDateString();

  lista.innerHTML="";

  datos.forEach(doc=>{
    let d=doc.data();

    let ganancia=d.total-d.monto;
    totalGanancia+=ganancia;
    totalPrestado+=d.monto;

    if(new Date(d.fecha).toDateString()===hoy){
      gananciaHoy+=ganancia;
    }

    let vencido=new Date()>new Date(d.fechaPago);
    if(d.estado==="pendiente") pendientes++;

    lista.innerHTML+=`
    <div class="card">
      👤 ${d.nombre}<br>
      📞 ${d.telefono}<br>
      💵 $${d.monto}<br>
      💰 $${d.total}<br>
      📅 Pago: ${new Date(d.fechaPago).toLocaleDateString()}<br>
      🧾 ${d.pagadas}/${d.cuotas}<br>
      💸 Cuota: $${Math.round(d.cuotaValor)}<br>
      ${vencido && d.estado==="pendiente" ? '<span class="alerta">⚠️ VENCIDO</span><br>' : ''}

      <a href="https://wa.me/573208202344?text=Hola ${d.nombre}, debes $${d.total}" target="_blank">
        <button>📲 Cobrar</button>
      </a>

      <button onclick="pagarCuota('${doc.id}',${d.pagadas})">Pagar cuota</button>
      <button onclick="pagar('${doc.id}')">Pagar todo</button>
      <button class="delete" onclick="eliminar('${doc.id}')">Eliminar</button>
    </div>
    `;
  });

  document.getElementById("gananciaTotal").innerText=totalGanancia;
  document.getElementById("totalPrestado").innerText=totalPrestado;
  document.getElementById("pendientes").innerText=pendientes;
  document.getElementById("hoy").innerText=gananciaHoy;
}

// VENCIDOS
async function verVencidos(){
  let user=firebase.auth().currentUser;

  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid).get();

  lista.innerHTML="";
  let hoy=new Date();

  datos.forEach(doc=>{
    let d=doc.data();
    if(hoy>new Date(d.fechaPago) && d.estado==="pendiente"){
      lista.innerHTML+=`<div class="card">⚠️ ${d.nombre} debe $${d.total}</div>`;
    }
  });
}

// RECORDAR
async function recordar(){
  let user=firebase.auth().currentUser;

  let datos=await db.collection("prestamos")
    .where("userId","==",user.uid).get();

  let hoy=new Date();

  datos.forEach(doc=>{
    let d=doc.data();
    if(hoy>new Date(d.fechaPago) && d.estado==="pendiente"){
      window.open(`https://wa.me/57${d.telefono}?text=Hola ${d.nombre}, tienes deuda de $${d.total}`,"_blank");
    }
  });
}

// PAGAR CUOTA
async function pagarCuota(id,pagadas){
  await db.collection("prestamos").doc(id).update({
    pagadas:pagadas+1
  });
  cargar();
}

// PAGAR TODO
async function pagar(id){
  await db.collection("prestamos").doc(id).update({
    estado:"pagado"
  });
  cargar();
}

// ELIMINAR
async function eliminar(id){
  await db.collection("prestamos").doc(id).delete();
  cargar();
}

</script>

</body>
</html>
