<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;}
input,select{width:100%;padding:10px;margin:5px;}
button{padding:10px;background:#22c55e;color:white;}
</style>
</head>

<body>

<h2>💰 Admin</h2>

<select id="cliente"></select>
<input id="monto" placeholder="Monto">
<input id="interes" placeholder="% interés">
<input id="cuotas" placeholder="Cuotas">
<input id="dias" placeholder="Días">

<button onclick="guardar()">Guardar</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

async function cargar(){
  let d=await db.collection("clientes").get();
  d.forEach(doc=>{
    let c=doc.data();
    document.getElementById("cliente").innerHTML+=
      `<option value="${c.uid}">${c.nombre}</option>`;
  });
}

async function guardar(){

  let monto=parseFloat(document.getElementById("monto").value);
  let interes=parseFloat(document.getElementById("interes").value);
  let cuotas=parseInt(document.getElementById("cuotas").value);
  let dias=parseInt(document.getElementById("dias").value);
  let clienteId=document.getElementById("cliente").value;

  let total=monto+(monto*interes/100);

  await db.collection("prestamos").add({
    clienteId,
    monto,
    total,
    cuotas,
    pagadas:0,
    fecha:new Date().toISOString()
  });

  alert("Guardado ✔️");
}

cargar();
</script>

</body>
</html>
