<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>J.B Préstamos</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .app {
    width: 100%;
    max-width: 420px;
    text-align: center;
    padding: 20px;
  }

  input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
  }

  button {
    background: green;
    color: white;
    font-weight: bold;
  }

  .card {
    background: #111827;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
  }
</style>

<!-- Firebase compat (ESTABLE para GitHub Pages) -->
<script>
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
      authDomain: "jb-prestamos.firebaseapp.com",
      projectId: "jb-prestamos",
      storageBucket: "jb-prestamos.appspot.com",
      messagingSenderId: "45452353450",
      appId: "1:45452353450:web:caaca5cf8ecf494043d5d3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.guardar = async function () {
      console.log("BOTÓN FUNCIONA");

      let nombre = document.getElementById("nombre").value;
      let monto = document.getElementById("monto").value;

      if (!nombre || !monto) {
        alert("Completa los campos");
        return;
      }

      try {
        await db.collection("prestamos").add({
          nombre,
          monto
        });

        alert("Guardado ✔️");
        cargar();
      } catch (e) {
        alert("error: " + e.message);
        console.log(e);
      }
    }

    async function cargar() {
      let lista = document.getElementById("lista");
      lista.innerHTML = "";

      let datos = await db.collection("prestamos").get();

      datos.forEach(doc => {
        let d = doc.data();

        lista.innerHTML += `
          <div class="card">
            👤 ${d.nombre} - 💵 ${d.monto}
          </div>
        `;
      });
    }

    cargar();

  } catch (error) {
    document.body.innerHTML = `
      <h3 style="color:white;text-align:center">
        ERROR AL CARGAR FIREBASE<br><br>
        ${error.message}
      </h3>
    `;
    console.log(error);
  }
</script>

</head>

<body>

<div class="app">

  <h1>💰 J.B Préstamos</h1>

  <input id="nombre" placeholder="Nombre del cliente">
  <input id="monto" placeholder="Monto del préstamo">
  <button onclick="guardar()">Guardar préstamo</button>

  <h2>📋 Lista</h2>
  <div id="lista"></div>

</div>

<script>
  // CONFIG FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
    authDomain: "jb-prestamos.firebaseapp.com",
    projectId: "jb-prestamos",
    storageBucket: "jb-prestamos.appspot.com",
    messagingSenderId: "45452353450",
    appId: "1:45452353450:web:caaca5cf8ecf494043d5d3"
  };

  // INIT
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // GUARDAR
  async function guardar() {
    let nombre = document.getElementById("nombre").value;
    let monto = document.getElementById("monto").value;

    if (!nombre || !monto) {
      alert("Completa los campos");
      return;
    }

    await db.collection("prestamos").add({
      nombre,
      monto
    });

    document.getElementById("nombre").value = "";
    document.getElementById("monto").value = "";

    cargar();
  }

  // CARGAR
  async function cargar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let datos = await db.collection("prestamos").get();

    datos.forEach(doc => {
      let d = doc.data();

      lista.innerHTML += `
        <div class="card">
          👤 ${d.nombre} <br>
          💵 $${d.monto}
        </div>
      `;
    });
  }

  cargar();
</script>

</body>
</html>
