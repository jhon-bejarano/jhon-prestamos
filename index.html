<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>J.B Capital</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
}

/* TARJETA FONDO */
body::before{
  content:"";
  position:fixed;
  width:90%;
  height:260px;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  border-radius:20px;
  background: linear-gradient(135deg,#22c55e,#3b82f6,#9333ea);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  z-index:0;
}

/* TEXTO TARJETA */
body::after{
  content:"J.B CAPITAL";
  position:fixed;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:bold;
  letter-spacing:2px;
  z-index:1;
}

/* CONTENEDOR */
.app{
  position:relative;
  z-index:2;
  max-width:420px;
  width:100%;
  padding:20px;
}

/* PANEL */
.panel{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  backdrop-filter:blur(10px);
  margin-bottom:15px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* BOTONES */
button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

.btn-main{background:#22c55e;}
.btn-blue{background:#3b82f6;}
.btn-orange{background:#f59e0b;}
.btn-red{background:#ef4444;}

/* CARDS */
.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* ALERTA */
.alerta{
  color:#f87171;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Iniciar sesión</h2>
  <input id="user" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">
  <button class="btn-main" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1>💰 J.B Capital</h1>

<div class="panel">
  <h3>💵 Ganancia: $<span id="gananciaTotal">0</span></h3>
  <h3>📊 Prestado: $<span id="totalPrestado">0</span></h3>
  <h3>⚠️ Pendientes: <span id="pendientes">0</span></h3>
  <h3>📅 Hoy: $<span id="hoy">0</span></h3>
</div>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="monto" placeholder="Monto">
<input id="interes" placeholder="Interés %">
<input id="dias" placeholder="Días">
<input id="cuotas" placeholder="Cuotas">

<button class="btn-main" onclick="guardar()">Guardar</button>
<button class="btn-blue" onclick="cargar()">Ver todos</button>
<button class="btn-orange" onclick="verVencidos()">Vencidos</button>
<button class="btn-red" onclick="recordar()">Recordar</button>

<h2>📋 Lista</h2>
<div id="lista"></div>

</div>

</div>

<script>

const firebaseConfig={
  apiKey:"AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain:"jb-prestamos.firebaseapp.com",
  projectId:"jb-prestamos"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// LOGIN
function login(){
  firebase.auth().signInWithEmailAndPassword(user.value,pass.value)
  .then(()=>{
    login.style.display="none";
    app.style.display="block";
    cargar();
  }).catch(e=>alert(e.message));
}

// GUARDAR
async function guardar(){
  let u=firebase.auth().currentUser;

  let nombre=val("nombre");
  let telefono=val("telefono");
  let monto=parseFloat(val("monto"));
  let interes=parseFloat(val("interes"));
  let dias=parseInt(val("dias"));
  let cuotas=parseInt(val("cuotas"));

  if(!nombre||!telefono||!monto||!interes||!dias||!cuotas){
    alert("Completa todo");
    return;
  }

  let total=monto+(monto*interes/100);
  let cuotaValor=total/cuotas;

  let f=new Date();
  let pago=new Date();
  pago.setDate(f.getDate()+dias);

  await db.collection("prestamos").add({
    nombre,telefono,monto,interes,total,
    cuotas,cuotaValor,pagadas:0,
    fecha:f.toISOString(),
    fechaPago:pago.toISOString(),
    estado:"pendiente",
    userId:u.uid
  });

  alert("Guardado ✔️");
  document.querySelectorAll("input").forEach(i=>i.value="");
  cargar();
}

function val(id){
  return document.getElementById(id).value;
}

// CARGAR
async function cargar(){
  let u=firebase.auth().currentUser;

  let datos=await db.collection("prestamos")
  .where("userId","==",u.uid).get();

  let g=0,tp=0,p=0,h=0;
  let hoy=new Date().toDateString();

  lista.innerHTML="";

  datos.forEach(doc=>{
    let d=doc.data();

    let gan=d.total-d.monto;
    g+=gan; tp+=d.monto;

    if(new Date(d.fecha).toDateString()===hoy) h+=gan;

    let vencido=new Date()>new Date(d.fechaPago);
    if(d.estado==="pendiente") p++;

    lista.innerHTML+=`
    <div class="card">
      <b>${d.nombre}</b><br>
      📞 ${d.telefono}<br>
      💵 $${d.monto} → 💰 $${d.total}<br>
      📅 ${new Date(d.fechaPago).toLocaleDateString()}<br>
      🧾 ${d.pagadas}/${d.cuotas} | $${Math.round(d.cuotaValor)}<br>
      ${vencido&&d.estado==="pendiente"?'<span class="alerta">⚠️ VENCIDO</span><br>':''}

      <a href="https://wa.me/573208202344?text=Hola ${d.nombre}, debes $${d.total}" target="_blank">
        <button class="btn-blue">Cobrar</button>
      </a>

      <button class="btn-main" onclick="pagarCuota('${doc.id}',${d.pagadas})">Cuota</button>
      <button class="btn-orange" onclick="pagar('${doc.id}')">Pagado</button>
      <button class="btn-red" onclick="eliminar('${doc.id}')">Eliminar</button>
    </div>`;
  });

  gananciaTotal.innerText=g;
  totalPrestado.innerText=tp;
  pendientes.innerText=p;
  hoy.innerText=h;
}

// VENCIDOS
async function verVencidos(){
  let u=firebase.auth().currentUser;
  let datos=await db.collection("prestamos")
  .where("userId","==",u.uid).get();

  lista.innerHTML="";
  let hoy=new Date();

  datos.forEach(doc=>{
    let d=doc.data();
    if(hoy>new Date(d.fechaPago)&&d.estado==="pendiente"){
      lista.innerHTML+=`<div class="card alerta">${d.nombre} debe $${d.total}</div>`;
    }
  });
}

// RECORDAR
async function recordar(){
  let u=firebase.auth().currentUser;
  let datos=await db.collection("prestamos")
  .where("userId","==",u.uid).get();

  let hoy=new Date();

  datos.forEach(doc=>{
    let d=doc.data();
    if(hoy>new Date(d.fechaPago)&&d.estado==="pendiente"){
      window.open(`https://wa.me/57${d.telefono}?text=Hola ${d.nombre}, debes $${d.total}`,"_blank");
    }
  });
}

// PAGAR CUOTA
async function pagarCuota(id,pagadas){
  await db.collection("prestamos").doc(id).update({
    pagadas:pagadas+1
  });
  cargar();
}

// PAGAR TOTAL
async function pagar(id){
  await db.collection("prestamos").doc(id).update({
    estado:"pagado"
  });
  cargar();
}

// ELIMINAR
async function eliminar(id){
  await db.collection("prestamos").doc(id).delete();
  cargar();
}

</script>

</body>
</html>
