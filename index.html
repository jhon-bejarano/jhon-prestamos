<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>J.B Préstamos PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    text-align: center;
  }

  input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
  }

  button {
    background: green;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  .delete {
    background: red;
  }

  .card {
    background: #111827;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<div class="app">

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 Iniciar sesión</h2>
    <input id="user" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none">

    <h1>💰 J.B Préstamos PRO</h1>

    <h2>💵 Ganancia total: $<span id="gananciaTotal">0</span></h2>

    <input id="nombre" placeholder="Nombre">
    <input id="monto" placeholder="Monto">
    <input id="interes" placeholder="Interés %">

    <button onclick="guardar()">Guardar</button>

    <h2>📋 Lista</h2>
    <div id="lista"></div>

  </div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 LOGIN REAL
function login() {
  let email = document.getElementById("user").value;
  let password = document.getElementById("pass").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      cargar();
    })
    .catch(error => {
      alert("Error: " + error.message);
    });
}

// 💰 GUARDAR
async function guardar() {
  let nombre = document.getElementById("nombre").value;
  let monto = parseFloat(document.getElementById("monto").value);
  let interes = parseFloat(document.getElementById("interes").value);

  if (!nombre || !monto || !interes) {
    alert("Completa todos los campos");
    return;
  }

  let total = monto + (monto * interes / 100);

  await db.collection("prestamos").add({
    nombre,
    monto,
    interes,
    total
  });

  alert("Guardado ✔️");

  document.getElementById("nombre").value = "";
  document.getElementById("monto").value = "";
  document.getElementById("interes").value = "";

  cargar();
}

// 📋 CARGAR + GANANCIAS
async function cargar() {
  let lista = document.getElementById("lista");
  let totalGanancia = 0;

  lista.innerHTML = "";

  let datos = await db.collection("prestamos").get();

  datos.forEach(doc => {
    let d = doc.data();

    let ganancia = d.total - d.monto;
    totalGanancia += ganancia;

    lista.innerHTML += `
      <div class="card">
        👤 ${d.nombre}<br>
        💵 $${d.monto}<br>
        📈 ${d.interes}%<br>
        💰 Total: $${d.total}<br>
        🟢 Ganancia: $${ganancia}<br>
        <button class="delete" onclick="eliminar('${doc.id}')">Eliminar</button>
      </div>
    `;
  });

  document.getElementById("gananciaTotal").innerText = totalGanancia;
}

// ❌ ELIMINAR
async function eliminar(id) {
  await db.collection("prestamos").doc(id).delete();
  cargar();
}

</script>

</body>
</html>
