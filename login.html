<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

/* 🔥 FONDO */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: url("fondo.jpg") no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🔥 CAPA OSCURA */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

/* 🔥 TARJETA CENTRAL (TIPO APP) */
.card{
  width:320px;
  background: rgba(15,23,42,0.95);
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  text-align:center;
}

/* 🔥 LOGO / TÍTULO */
.title{
  font-size:20px;
  margin-bottom:20px;
  font-weight:bold;
}

/* 🔥 INPUTS */
input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#020617;
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#94a3b8;
}

/* 🔥 BOTONES */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* NEQUI STYLE */
.btn-primary{
  background:#00c853;
}
.btn-primary:hover{
  background:#00b248;
}

.btn-secondary{
  background:#2979ff;
}
.btn-secondary:hover{
  background:#1565c0;
}

/* 🔥 OTP */
#codigo{
  text-align:center;
  letter-spacing:6px;
  font-size:18px;
}

</style>

</head>

<body>

<div class="container">
  <div class="card">

    <h2>🔐 Login</h2>

    <input id="email" placeholder="Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

  </div>
</div>

<script>

// 🔥 CONFIG REAL
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

// 🔥 INICIALIZAR
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

// 🔵 LOGIN CORREGIDO
async function login(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!email || !password){
    alert("Completa todos los campos");
    return;
  }

  try{

    let user = await auth.signInWithEmailAndPassword(email,password);

    // 🔥 ADMIN
    if(user.user.email === "bjhon1994@gmail.com"){
      window.location.href = "admin.html";
    } 
    // 👤 CLIENTE
    else{
      window.location.href = "cliente.html";
    }

  }catch(e){
    alert("Error: " + e.message);
  }
}

</script>

</body>
</html>
