<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - J.B Capital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

/* 🔥 FONDO */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: url("fondo.jpg") no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🔥 CAPA OSCURA */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75);
  z-index:-1;
}

/* 🔥 TARJETA CENTRAL (TIPO APP) */
.card{
  width:320px;
  background: rgba(15,23,42,0.95);
  border-radius:25px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  text-align:center;
}

/* 🔥 LOGO / TÍTULO */
.title{
  font-size:20px;
  margin-bottom:20px;
  font-weight:bold;
}

/* 🔥 INPUTS */
input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#020617;
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#94a3b8;
}

/* 🔥 BOTONES */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

/* NEQUI STYLE */
.btn-primary{
  background:#00c853;
}
.btn-primary:hover{
  background:#00b248;
}

.btn-secondary{
  background:#2979ff;
}
.btn-secondary:hover{
  background:#1565c0;
}

/* 🔥 OTP */
#codigo{
  text-align:center;
  letter-spacing:6px;
  font-size:18px;
}

</style>
</head>

<body>

<div class="card">

<h2>🟢 Crear cuenta</h2>

<input id="cedula" placeholder="Cédula">
<input id="telefono" placeholder="Teléfono (3001234567)">
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button class="btn-secondary" onclick="enviarCodigo()">📲 Enviar código</button>

<input id="codigo" placeholder="Código OTP">

<button class="btn-primary" onclick="verificarCodigo()">✅ Verificar y crear</button>

<div id="recaptcha"></div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;

// 🔐 RECAPTCHA
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'normal'
});

// 📲 ENVIAR CÓDIGO
async function enviarCodigo(){

  let telefono = document.getElementById("telefono").value;

  if(!telefono){
    alert("Ingresa el teléfono");
    return;
  }

  let numero = "+57" + telefono;

  try{
    confirmationResult = await auth.signInWithPhoneNumber(numero, recaptchaVerifier);
    alert("Código enviado ✔️");
  }catch(e){
    alert("Error: " + e.message);
    console.log(e);
  }
}

// ✅ VERIFICAR Y CREAR CUENTA (CORREGIDO)
async function verificarCodigo(){

  let codigo = document.getElementById("codigo").value;

  let cedula = val("cedula");
  let telefono = val("telefono");
  let email = val("email");
  let password = val("password");

  if(!codigo || !cedula || !telefono || !email || !password){
    alert("Completa todos los campos");
    return;
  }

  try{

    // 🔐 CONFIRMAR OTP
    let result = await confirmationResult.confirm(codigo);
    let user = result.user;

    // 🔗 VINCULAR EMAIL
    let credential = firebase.auth.EmailAuthProvider.credential(email, password);
    await user.linkWithCredential(credential);

    // 💾 GUARDAR CLIENTE
    await db.collection("clientes").doc(user.uid).set({
      cedula,
      telefono,
      email,
      verificado:true,
      completo:false,
      fechaRegistro:new Date().toISOString()
    });

    alert("Cuenta creada ✔️");

    window.location.href = "login.html";

  }catch(e){
    alert("Error: " + e.message);
    console.log(e);
  }
}

// 🔧 UTIL
function val(id){
  return document.getElementById(id).value;
}

</script>

</body>
</html>
