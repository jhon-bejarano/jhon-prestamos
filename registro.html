<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Cliente</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  width:300px;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}
button{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:5px;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>🟢 Registro Cliente</h2>

<input id="nombre" placeholder="Nombre completo">
<input id="telefono" placeholder="Teléfono">

<input id="cedula" placeholder="Cédula">
<label>Fecha nacimiento</label>
<input type="date" id="nacimiento">

<label>Fecha expedición documento</label>
<input type="date" id="expedicion">

<h4>Referencia 1</h4>
<input id="ref1nombre" placeholder="Nombre referencia 1">
<input id="ref1tel" placeholder="Teléfono referencia 1">

<h4>Referencia 2</h4>
<input id="ref2nombre" placeholder="Nombre referencia 2">
<input id="ref2tel" placeholder="Teléfono referencia 2">

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="registrar()">Crear cuenta</button>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function registrar(){

  let nombre = nombreInput("nombre");
  let telefono = nombreInput("telefono");
  let cedula = nombreInput("cedula");
  let nacimiento = nombreInput("nacimiento");
  let expedicion = nombreInput("expedicion");

  let ref1nombre = nombreInput("ref1nombre");
  let ref1tel = nombreInput("ref1tel");

  let ref2nombre = nombreInput("ref2nombre");
  let ref2tel = nombreInput("ref2tel");

  let email = nombreInput("email");
  let password = nombreInput("password");

  if(!nombre || !telefono || !cedula || !email || !password){
    alert("Completa todos los campos");
    return;
  }

  try{

    let user = await auth.createUserWithEmailAndPassword(email,password);

    await db.collection("clientes").doc(user.user.uid).set({
      nombre,
      telefono,
      cedula,
      nacimiento,
      expedicion,
      email,
      cupo:100000,

      referencias:[
        {nombre:ref1nombre, telefono:ref1tel},
        {nombre:ref2nombre, telefono:ref2tel}
      ]
    });

    alert("Cuenta creada");
    window.location.href="login.html";

  }catch(e){
    alert(e.message);
  }
}

function nombreInput(id){
  return document.getElementById(id).value;
}

</script>

</body>
</html>
