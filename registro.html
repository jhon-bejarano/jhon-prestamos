<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro con OTP</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center">

<h2>Registro</h2>

<input id="cedula" placeholder="Cédula"><br><br>
<input id="telefono" placeholder="Teléfono (Ej: 3001234567)"><br><br>
<input id="email" placeholder="Correo"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<button onclick="enviarCodigo()">Enviar código</button>

<br><br>

<input id="codigo" placeholder="Código OTP"><br><br>
<button onclick="verificarCodigo()">Verificar y crear cuenta</button>

<div id="recaptcha"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;

// 🔐 RECAPTCHA
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'normal'
});

// 📲 ENVIAR OTP
async function enviarCodigo(){

  let telefono = document.getElementById("telefono").value;

  if(!telefono){
    alert("Ingresa teléfono");
    return;
  }

  let numero = "+57" + telefono;

  try{
    confirmationResult = await auth.signInWithPhoneNumber(numero, recaptchaVerifier);
    alert("Código enviado ✔️");
  }catch(e){
    alert("Error: " + e.message);
  }
}

// ✅ VERIFICAR OTP Y CREAR CUENTA
async function verificarCodigo(){

  let codigo = document.getElementById("codigo").value;

  let cedula = val("cedula");
  let telefono = val("telefono");
  let email = val("email");
  let password = val("password");

  if(!codigo){
    alert("Ingresa el código");
    return;
  }

  try{

    await confirmationResult.confirm(codigo);

    // 🔥 CREAR USUARIO EMAIL
    let user = await auth.createUserWithEmailAndPassword(email,password);

    await db.collection("clientes").doc(user.user.uid).set({
      cedula,
      telefono,
      email,
      verificado:true,
      completo:false
    });

    alert("Cuenta verificada y creada ✔️");

    window.location.href="login.html";

  }catch(e){
    alert("Código incorrecto");
  }
}

function val(id){
  return document.getElementById(id).value;
}

</script>

</body>
</html>
