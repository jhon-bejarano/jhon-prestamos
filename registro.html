<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - J.B Capital</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
}

h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.btn-primary{
  background:#22c55e;
}

.btn-secondary{
  background:#3b82f6;
}

#recaptcha{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>🟢 Crear cuenta</h2>

<input id="cedula" placeholder="Cédula">
<input id="telefono" placeholder="Teléfono (3001234567)">
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button class="btn-secondary" onclick="enviarCodigo()">📲 Enviar código</button>

<input id="codigo" placeholder="Código OTP">

<button class="btn-primary" onclick="verificarCodigo()">✅ Verificar y crear</button>

<div id="recaptcha"></div>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;

// 🔐 RECAPTCHA
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha', {
  size: 'normal'
});

// 📲 ENVIAR CÓDIGO
async function enviarCodigo(){

  let telefono = document.getElementById("telefono").value;

  if(!telefono){
    alert("Ingresa el teléfono");
    return;
  }

  let numero = "+57" + telefono;

  try{
    confirmationResult = await auth.signInWithPhoneNumber(numero, recaptchaVerifier);
    alert("Código enviado ✔️");
  }catch(e){
    alert("Error: " + e.message);
    console.log(e);
  }
}

// ✅ VERIFICAR Y CREAR CUENTA (CORREGIDO)
async function verificarCodigo(){

  let codigo = document.getElementById("codigo").value;

  let cedula = val("cedula");
  let telefono = val("telefono");
  let email = val("email");
  let password = val("password");

  if(!codigo || !cedula || !telefono || !email || !password){
    alert("Completa todos los campos");
    return;
  }

  try{

    // 🔐 CONFIRMAR OTP
    let result = await confirmationResult.confirm(codigo);
    let user = result.user;

    // 🔗 VINCULAR EMAIL
    let credential = firebase.auth.EmailAuthProvider.credential(email, password);
    await user.linkWithCredential(credential);

    // 💾 GUARDAR CLIENTE
    await db.collection("clientes").doc(user.uid).set({
      cedula,
      telefono,
      email,
      verificado:true,
      completo:false,
      fechaRegistro:new Date().toISOString()
    });

    alert("Cuenta creada ✔️");

    window.location.href = "login.html";

  }catch(e){
    alert("Error: " + e.message);
    console.log(e);
  }
}

// 🔧 UTIL
function val(id){
  return document.getElementById(id).value;
}

</script>

</body>
</html>
