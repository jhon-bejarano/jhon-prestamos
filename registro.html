<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<h2>Registro</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="email" placeholder="Correo">
<input id="password" type="password">

<button onclick="registrar()">Crear cuenta</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBXWsZzM1E-XTqS0KlbxRea9BoKWQakIug",
  authDomain: "jb-prestamos.firebaseapp.com",
  projectId: "jb-prestamos"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function registrar(){

  let nombre = nombre.value;
  let telefono = telefono.value;
  let email = email.value;
  let password = password.value;

  let user = await auth.createUserWithEmailAndPassword(email,password);

  await db.collection("clientes").doc(user.user.uid).set({
    nombre,
    telefono,
    email
  });

  alert("Cuenta creada");
  window.location.href="login.html";
}

</script>

</body>
</html>
